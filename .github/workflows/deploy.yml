name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0
      
      - name: Pre-build validation
        run: |
          echo "--- CNAME check ---"
          if [ ! -f CNAME ] && [ ! -f public/CNAME ]; then
            echo "::error::CNAME file missing"; exit 1
          fi
          echo "--- robots.txt check ---"
          if [ ! -f robots.txt ] && [ ! -f public/robots.txt ]; then
            echo "::warning::robots.txt missing (SEO impact)"
          fi
          echo "--- package.json name check ---"
          PKG_NAME=$(node -p "require('./package.json').name")
          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          if [ "$PKG_NAME" != "$REPO_NAME" ]; then
            echo "::warning::package.json name '$PKG_NAME' != repo name '$REPO_NAME'"
          fi
          echo "Validation passed"
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_ACTIONS: true
      
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "Error: dist/index.html not found"
            exit 1
          fi
          echo "Build verification passed"
          ls -la dist/
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Output deployment URL
        run: |
          echo "🎉 Deployment successful!"
          echo "📱 Site URL: ${{ steps.deployment.outputs.page_url }}"
